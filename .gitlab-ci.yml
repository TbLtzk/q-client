# build and publish docker image to the registry
build:
  image: docker:latest
  stage: build
  tags:
    - gitlab-org-docker
#  only:
#    - master
#    - latest
#    - /^v\d+\.\d+\.\d+$/ # semver tags
  script:
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
    - apk add --no-cache git make musl-dev go
    - export GOROOT="/usr/lib/go" #PATH="/usr/local/go/bin:$PATH"
    - export GOPATH="/go" #GOPATH=/opt/go/
    - export PATH="/go/bin:$PATH" #PATH=$PATH:$GOPATH/bin
    - mkdir -p ${GOPATH}/src ${GOPATH}/bin
    - go version
    - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/".insteadOf https://gitlab.com/
    - go env -w GOPRIVATE=gitlab.com/${CI_PROJECT_NAMESPACE}
    - apk add --no-cache make gcc musl-dev linux-headers
    - make all
    # build binary
    - version=$(test -z $CI_COMMIT_TAG && echo $CI_COMMIT_SHA || echo $CI_COMMIT_TAG)
    - docker build --build-arg version="$version" -t $BUILD_IMAGE -f $BUILD_DOCKERFILE .
    - docker push $BUILD_IMAGE

deploy_devnet:
  image: alpine
  stage: deploy
  tags:
    - gitlab-org-docker
  only:
    - master
  script:
    - apk add openssh
    - mkdir -p ~/.ssh
    - echo "${DEV_SSH_PRIVATE_KEY}" | tr -d '\r' >> ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
    - sed -i "s@{{ .Image }}@${BUILD_IMAGE}@g" docker-compose.yaml    # replace image in docker-compose
    - scp docker-compose.yaml ubuntu@$DEV_HOST:~/docker-compose.yaml
    - ssh ubuntu@$DEV_HOST "docker login -u gitlab-ci-token -p ${CI_BUILD_TOKEN} registry.gitlab.com
                            && cd developer-edition
                            && docker-compose down
                            && docker image prune -a -f
                            && docker-compose up -d"