---

variables:
  IMAGE_NAME: "qdevelopment/q-client"
  RELEASE_IMAGE_NAME: "qblockchain/q-client"
  IMAGE_NAME_ARM: "qdevelopment/q-client-arm"
  RELEASE_IMAGE_NAME_ARM: "qblockchain/q-client-arm"


.before_script_template:
  before_script:
    - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/".insteadOf https://gitlab.com/
    - go env -w GOPRIVATE=gitlab.com/${CI_PROJECT_NAMESPACE}

stages:
  - "build"
  - "test"
  - "release"
  - "deploy"

test:
  image: golang:1.19.5
  stage: test
  extends: .before_script_template
  tags:
    - gitlab-org-docker
  only:
    - merge_requests
    - master
  script:
    - GO111MODULE=off go get gotest.tools/gotestsum
    - gotestsum --junitfile report.xml --format testname
  artifacts:
    when: always
    reports:
      junit: report.xml

lint:
  image: golang:1.19.5
  stage: test
  extends: .before_script_template
  tags:
    - gitlab-org-docker
  only:
    - merge_requests
    - master
  script:
    - go run build/ci.go lint

build:
  image:
    name: "gcr.io/kaniko-project/executor:v1.9.2-debug"
    entrypoint: [""]
  stage: "build"
  tags:
    - "gitlab-org-docker"
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"},\"${CI_DEPENDENCY_PROXY_SERVER}\":{\"auth\":\"$(printf "%s:%s" ${CI_DEPENDENCY_PROXY_USER} "${CI_DEPENDENCY_PROXY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    - >-
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile.alltools"
      --build-arg PROXY="${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/"
      --cache=true
      --cache-repo=registry.gitlab.com/q-dev/q-client/cache
      --destination "${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}"
      --destination "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      --build-arg COMMIT="${CI_COMMIT_SHORT_SHA}"
      --build-arg ARCH="amd64/"
      --build-arg VERSION="${CI_COMMIT_TAG}"
      --build-arg BUILDNUM="${CI_JOB_ID}"
      --build-arg BUILD_TOKEN="${CI_JOB_TOKEN}"
      --build-arg USERNAME="gitlab-ci-token"

build-arm:
  image:
    name: "gcr.io/kaniko-project/executor:v1.9.2-debug"
    entrypoint: [""]
  stage: "build"
  when: manual
  tags:
    - "gitlab-org-docker-arm"
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"},\"${CI_DEPENDENCY_PROXY_SERVER}\":{\"auth\":\"$(printf "%s:%s" ${CI_DEPENDENCY_PROXY_USER} "${CI_DEPENDENCY_PROXY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    - >-
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile.alltools"
      --cache=true
      --cache-repo=registry.gitlab.com/q-dev/q-client/cache-arm
      --destination "${CI_REGISTRY_IMAGE}/arm:${CI_COMMIT_REF_SLUG}"
      --destination "${CI_REGISTRY_IMAGE}/arm:${CI_COMMIT_SHA}"
      --build-arg COMMIT="${CI_COMMIT_SHORT_SHA}"
      --build-arg ARCH="arm64v8/"
      --build-arg VERSION="${CI_COMMIT_TAG}"
      --build-arg BUILDNUM="${CI_JOB_ID}"
      --build-arg BUILD_TOKEN="${CI_JOB_TOKEN}"
      --build-arg USERNAME="gitlab-ci-token"

publish:
  image:
    name: "gcr.io/go-containerregistry/crane/debug:v0.11.0"
    entrypoint: [""]
  stage: "release"
  tags:
    - "gitlab-org-docker"
  only:
    - "tags"
  needs:
    - "build"
  before_script:
    - "crane auth login index.docker.io -u ${REGISTRY_USER} -p ${REGISTRY_PASS}"
    - "crane auth login ${CI_REGISTRY} -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD}"
  script:
    - >-
      crane copy "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}" "${RELEASE_IMAGE_NAME}:${CI_COMMIT_TAG}"
    - >-
      crane copy "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}" "${RELEASE_IMAGE_NAME}:latest"
    - >-
      crane copy "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}" "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
    - >-
      crane copy "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}" "${CI_REGISTRY_IMAGE}:latest"

publish-arm:
  image:
    name: "gcr.io/go-containerregistry/crane/debug:v0.11.0"
    entrypoint: [""]
  stage: "release"
  when: manual
  tags:
    - "gitlab-org-docker-arm"
  only:
    - "tags"
  needs:
    - "build-arm"
  before_script:
    - "crane auth login index.docker.io -u ${REGISTRY_USER} -p ${REGISTRY_PASS}"
    - "crane auth login ${CI_REGISTRY} -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD}"
  script:
    - >-
      crane copy "${CI_REGISTRY_IMAGE}/arm:${CI_COMMIT_SHA}" "${RELEASE_IMAGE_NAME_ARM}:${CI_COMMIT_TAG}"
    - >-
      crane copy "${CI_REGISTRY_IMAGE}/arm:${CI_COMMIT_SHA}" "${RELEASE_IMAGE_NAME_ARM}:latest"
    - >-
      crane copy "${CI_REGISTRY_IMAGE}/arm:${CI_COMMIT_SHA}" "${CI_REGISTRY_IMAGE}/arm:${CI_COMMIT_TAG}"
    - >-
      crane copy "${CI_REGISTRY_IMAGE}/arm:${CI_COMMIT_SHA}" "${CI_REGISTRY_IMAGE}/arm:latest"

