services:
  - docker:dind

variables:
  IMAGE_NAME: registry.gitlab.com/q-dev/q-client
  BUILD_IMAGE: $IMAGE_NAME:$CI_COMMIT_SHA
  BUILD_DOCKERFILE: Dockerfile.alltools

.before_script_template:
  before_script:
    - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/".insteadOf https://gitlab.com/
    - go env -w GOPRIVATE=gitlab.com/${CI_PROJECT_NAMESPACE}

stages:
  - test
  - build
  - release
  - deploy

test:
  image: golang:1.14
  stage: test
  extends: .before_script_template
  tags:
    - gitlab-org-docker
  only:
    - merge_requests
    - master
  script:
    - go test ./...

lint:
  image: golang:1.14
  stage: test
  extends: .before_script_template
  tags:
    - gitlab-org-docker
  only:
    - merge_requests
    - master
  script:
    - go run build/ci.go lint

# build and publish docker image to the registry
build:
  image: docker:latest
  stage: build
  tags:
    - gitlab-org-docker
  only:
    - master
    - latest
    - /^v\d+\.\d+\.\d+$/ # semver tags
  script:
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
    # build binary
    - version=$(test -z $CI_COMMIT_TAG && echo $CI_COMMIT_SHA || echo $CI_COMMIT_TAG)
    - docker build --build-arg version="$version" --build-arg BUILD_TOKEN=${CI_JOB_TOKEN} --build-arg USERNAME=gitlab-ci-token -t $BUILD_IMAGE -f $BUILD_DOCKERFILE .
    - docker push $BUILD_IMAGE
    - docker tag $BUILD_IMAGE $IMAGE_NAME:latest
    - docker push $IMAGE_NAME:latest

# re-tag corresponding image with git tag and publish
# works only for tags on master
release:
  image: docker:latest
  stage: release
  tags:
    - gitlab-org-docker
  only:
    - tags
  script:
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
    - docker pull $BUILD_IMAGE
    - docker tag $BUILD_IMAGE $IMAGE_NAME:$CI_COMMIT_TAG
    - docker push $IMAGE_NAME:$CI_COMMIT_TAG

