services:
  - docker:dind

variables:
  IMAGE_NAME: registry.gitlab.com/q-dev/go-ethereum
  BUILD_IMAGE: $IMAGE_NAME:$CI_COMMIT_SHA
  BUILD_DOCKERFILE: Dockerfile.alltools

.before_script_template: &lint_test
  before_script:
    - apk add --no-cache git
    - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/".insteadOf https://gitlab.com/
    - go env -w GOPRIVATE=gitlab.com/${CI_PROJECT_NAMESPACE}

stages:
  - build
  - deploy

