version: "3"

services:
  bootnode:
    image: {{ .Image }}
    container_name: bootnode
    environment:
      - DATADIR=/data
      - IP=54.187.245.252
      - GENESIS_PATH=qdevnet.json
    entrypoint: ["/bin/sh","./bootnode.sh"]
    # "bootnode", "-nodekey=/bootnode/boot.key", "-verbosity=9" , "-addr=172.25.0.100:30301"
    volumes:
      - ./configs/qdevnet.json:/qdevnet.json
      - ./bootnode.sh:/bootnode.sh
      - bootnode_v:/data
    ports:
      - 30301:30301
    #networks:
     # chainnet:
      #  ipv4_address: 172.25.0.100

  miner-1:
    image: {{ .Image }}
    container_name: miner-1
    depends_on:
      - bootnode
    environment:
      - SLEEP=1
      - ACCOUNT_ADDR=64d4edefe8ba86d3588b213b0a053e7b910cad68
      - DATADIR=/data
      - PASS_PATH=/data/keystore/pwd.txt
      - IP=54.187.245.252
      - GENESIS_PATH=qdevnet.json
      - BOOTNODE_ADDR=enode://22adab037308f02abbb0fd7e831c75afa367b36615b2a0358a5c4673912cf384de6c8e688371822488622ebee383aeea5d41087160cb70484a9f1671876871b1@54.187.245.252:30301
    entrypoint: ["/bin/sh","./entrypoint.sh"]
    volumes:
      - ./configs/miner1/keystore:/data/keystore
      - ./entrypoint.sh:/entrypoint.sh
      - ./configs/qdevnet.json:/qdevnet.json
      - miner1:/data
    ports:
      - 8545:8545
      - 30303:30303
    #networks:
     # chainnet:
      #  ipv4_address: 172.25.0.101

  miner-2:
    image: {{ .Image }}
    container_name: miner-2
    depends_on:
      - bootnode
      - miner-1
    environment:
      - SLEEP=20
      - ACCOUNT_ADDR=6a39b688d591ea00c9ea69658438794204b5cc62
      - DATADIR=/data
      - PASS_PATH=/data/keystore/pwd.txt
      - IP=54.187.245.252
      - GENESIS_PATH=qdevnet.json
      - BOOTNODE_ADDR=enode://22adab037308f02abbb0fd7e831c75afa367b36615b2a0358a5c4673912cf384de6c8e688371822488622ebee383aeea5d41087160cb70484a9f1671876871b1@54.187.245.252:30301
    entrypoint: ["/bin/sh","./entrypoint.sh"]
    volumes:
      - ./configs/miner2/keystore:/data/keystore
      - ./entrypoint.sh:/entrypoint.sh
      - ./configs/qdevnet.json:/qdevnet.json
      - miner2:/data
    ports:
      - 30304:30303
    #networks:
     # chainnet:
      #  ipv4_address: 172.25.0.102

  miner-3:
    image: {{ .Image }}
    container_name: miner-3
    depends_on:
      - bootnode
      - miner-1
      - miner-2
    environment:
      - SLEEP=40
      - ACCOUNT_ADDR=4a14d788d86d021670ebcece1196631d66595984
      - DATADIR=/data
      - PASS_PATH=/data/keystore/pwd.txt
      - IP=54.187.245.252
      - GENESIS_PATH=qdevnet.json
      - BOOTNODE_ADDR=enode://22adab037308f02abbb0fd7e831c75afa367b36615b2a0358a5c4673912cf384de6c8e688371822488622ebee383aeea5d41087160cb70484a9f1671876871b1@54.187.245.252:30301
    entrypoint: ["/bin/sh","./entrypoint.sh"]
    volumes:
      - ./configs/miner3/keystore:/data/keystore
      - ./entrypoint.sh:/entrypoint.sh
      - ./configs/qdevnet.json:/qdevnet.json
      - miner3:/data
    ports:
      - 30305:30303
    #networks:
     # chainnet:
      #  ipv4_address: 172.25.0.103

  explorer:
    image: alethio/ethereum-lite-explorer
    depends_on:
      - miner-1
      - miner-2
      - miner-3
      - bootnode
    environment:
      - APP_NODE_URL=http://localhost:8545
    ports:
      - 80:80

#networks:
 # chainnet:
  #  driver: bridge
   # ipam:
    #  config:
     #   - subnet: 172.25.0.0/24

volumes:
  bootnode_v:
  miner1:
  miner2:
  miner3:
