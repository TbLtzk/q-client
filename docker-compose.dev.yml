version: '3.8'

services:
  goimports:
    image: q-client-dev:latest
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/workspace
    working_dir: /workspace
    # goimports is pre-installed in the image
    command: go run golang.org/x/tools/cmd/goimports@v0.19.0 -w .
    profiles:
      - goimports

  golangci-lint:
    image: q-client-dev:latest
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/workspace
    working_dir: /workspace
    # golangci-lint is pre-installed in the image
    command: golangci-lint run --config .golangci.yml ./...
    profiles:
      - lint

  test:
    image: q-client-dev:latest
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/workspace
    working_dir: /workspace
    # Use module cache so CGO deps (e.g. blst) have full source; go mod vendor prunes them (golang/go#26366)
    environment:
      - CGO_ENABLED=1
      - GOFLAGS=-mod=mod
    # Default command - can be overridden
    command: go test ./...
    profiles:
      - test

